<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#7 Restaurant</title>

<style>
body{margin:0;font-family:sans-serif;color:#fff;background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('https://images.unsplash.com/photo-1523413651479-597eb2da0ad6') center/cover fixed}
header{display:flex;justify-content:space-between;align-items:center;padding:15px}
button{cursor:pointer}
.menu{padding:15px}
.section{margin-bottom:25px}
.section h2{color:#ffd700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#222;padding:10px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.qty{display:flex;gap:5px}
.qty button{background:#ffd700;border:none;padding:5px 10px;border-radius:5px}
.cart{position:fixed;right:0;top:0;width:300px;height:100%;background:#111;padding:15px;display:none;overflow:auto}
#ordersPage{display:none;padding:15px;background:#111;position:fixed;top:0;left:0;width:100%;height:100%;overflow:auto}
</style>
</head>

<body>

<header>
<h2>#7 Restaurant</h2>
<div id="authBox"><button onclick="login()">Login</button></div>
<button onclick="toggleCart()">Cart 🛒</button>
</header>

<div style="padding:10px">
<button onclick="showOrders()" style="background:#ffd700;border:none;padding:8px 12px;border-radius:6px">My Orders</button>
</div>

<div class="menu" id="menu"></div>

<div class="cart" id="cartBox">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<p id="total">Total: ₹0</p>
<button onclick="payNow()">Pay</button>
<button onclick="clearCart()">Cancel</button>
<button onclick="toggleCart()">Close</button>
</div>

<div id="ordersPage">
<h2>My Orders</h2>
<div id="ordersList"></div>
<button onclick="closeOrders()">Close</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const OWNER_WHATSAPP="919021268038";

const firebaseConfig={
 apiKey:"AIzaSyBZa8qNux45ko8RDq-b6bmji-rBuugOTkM",
 authDomain:"sample-restaurant-websit-f6985.firebaseapp.com",
 projectId:"sample-restaurant-websit-f6985"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null;

auth.onAuthStateChanged(u=>{
 user=u;
 const box=document.getElementById("authBox");
 if(u){box.innerHTML=`${u.displayName} <button onclick="logout()">Logout</button>`;}
 else{box.innerHTML=`<button onclick="login()">Login</button>`;}
});

function login(){
 const provider=new firebase.auth.GoogleAuthProvider();
 auth.signInWithRedirect(provider);
}

function logout(){auth.signOut();}

auth.getRedirectResult();

const menuData={"Breakfast":[{n:"Bread Butter",p:20},{n:"Toast",p:30},{n:"Bun Maska",p:25}],"Tea":[{n:"Chai",p:12},{n:"Black Tea",p:15}],"Snacks":[{n:"Fries",p:60},{n:"Sandwich",p:50}]};

let cart={};

function render(){
 let html="";
 for(let cat in menuData){
  html+=`<div class='section'><h2>${cat}</h2><div class='grid'>`;
  menuData[cat].forEach(i=>{
   html+=`<div class='card'>${i.n} ₹${i.p}
   <div class='qty'>
   <button onclick="change('${i.n}',${i.p},-1)">-</button>
   <span id='q-${i.n}'>0</span>
   <button onclick="change('${i.n}',${i.p},1)">+</button>
   </div></div>`;
  });
  html+="</div></div>";
 }
 document.getElementById("menu").innerHTML=html;
}

function change(n,p,v){
 if(!cart[n]) cart[n]={qty:0,price:p};
 cart[n].qty+=v;
 if(cart[n].qty<=0) delete cart[n];
 document.getElementById(`q-${n}`).innerText=cart[n]?cart[n].qty:0;
 updateCart();
}

function updateCart(){
 let total=0,html="";
 for(let i in cart){total+=cart[i].qty*cart[i].price;html+=`${i} x${cart[i].qty}<br>`;}
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText="Total: ₹"+total;
}

function toggleCart(){
 const c=document.getElementById("cartBox");
 c.style.display=c.style.display==="block"?"none":"block";
}

function clearCart(){cart={};render();updateCart();}

function generateMsg(pid){
 let msg="Order%0A";
 for(let i in cart){msg+=`${i} x${cart[i].qty}%0A`;}
 return msg+`Total: ₹${Object.values(cart).reduce((t,i)=>t+i.qty*i.price,0)}%0APayment:${pid}`;
}

function payNow(){
 if(!user){alert("Login first");return;}
 let total=0;for(let i in cart) total+=cart[i].qty*cart[i].price;

 const options={
  key:"rzp_test_SSfbjt7z6btSQf",
  amount:total*100,
  currency:"INR",
  name:"#7 Restaurant",
  handler:function(res){
   const order={user:user.email,cart:JSON.parse(JSON.stringify(cart)),total,time:new Date(),paymentId:res.razorpay_payment_id};

   db.collection("orders").add(order)
   .then(()=>{
     window.location.href=`https://wa.me/${OWNER_WHATSAPP}?text=${generateMsg(res.razorpay_payment_id)}`;
   })
   .catch(e=>{alert("Error saving order");console.log(e);});
  }
 };
 new Razorpay(options).open();
}

function showOrders(){
 if(!user){alert("Login first");return;}
 document.getElementById("ordersPage").style.display="block";

 db.collection("orders").where("user","==",user.email).get()
 .then(snap=>{
  let html="";
  snap.forEach(doc=>{
    const d=doc.data();
    html+=`<div><b>₹${d.total}</b><br>`;
    for(let i in d.cart){html+=`${i} x${d.cart[i].qty}<br>`;}
    html+="<hr></div>";
  });
  document.getElementById("ordersList").innerHTML=html||"No orders";
 });
}

function closeOrders(){document.getElementById("ordersPage").style.display="none";}

render();
</script>

</body>
</html>
